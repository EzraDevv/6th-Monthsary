<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy 6th Monthsary</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Pacifico&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/intro.css">
<link rel="stylesheet" href="css/music.css">
<link rel="stylesheet" href="css/message.css">
<link rel="stylesheet" href="css/hearts.css">
<link rel="stylesheet" href="css/animations.css">

</head>

<body>

<div id="introScreen" class="intro-screen">

    <div class="intro-card">

        <div class="sparkles">🎀🎀🎀</div>

        <h1>Happy 6th Monthsary</h1>

        <p>I prepared something special for you 🌸</p>

        <button id="startBtn">
            Start
        </button>

    </div>

</div>

<button id="musicBtn" class="music-btn">

<img
id="musicIcon"
src="assets/img/giphy (2).gif"
alt="Music">

</button>

<audio id="bgMusic" playsinline>

<source
src="assets/audio/Rico Blanco - Your Universe (LyricsLetra).mp3"
type="audio/mpeg">

</audio>

<div class="hearts">

<span style="left:10%;animation-delay:0s;">🌸</span>
<span style="left:25%;animation-delay:2s;">🌸</span>
<span style="left:40%;animation-delay:5s;">🌸</span>
<span style="left:60%;animation-delay:1s;">🌸</span>
<span style="left:75%;animation-delay:4s;">🌸</span>
<span style="left:90%;animation-delay:7s;">🌸</span>

</div>

<div class="container">

<div id="message" class="message"></div>

</div>

<script defer src="js/messages.js"></script>
<script defer src="js/music.js"></script>
<script defer src="js/effects.js"></script>
<script defer src="js/intro.js"></script>
<script defer src="js/app.js"></script>

</body>

</html>
